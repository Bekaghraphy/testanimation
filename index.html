<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hesham Abdelhamed | Portfolio</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Libraries -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>

    <style>
        :root {
            --bg-color: #050505;
            --text-color: #ffffff;
            --accent-color: #d8b97a;
            --panel-bg: #232323;
        }

        .light-mode {
            --bg-color: #f5f5f5;
            --text-color: #111111;
            --accent-color: #b08d4b;
            --panel-bg: #e0e0e0;
        }

        body { 
            font-family: 'Montserrat', 'Cairo', sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            overflow-x: hidden; 
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        
        .rtl { direction: rtl; font-family: 'Cairo', sans-serif; }
        .ltr { direction: ltr; font-family: 'Montserrat', sans-serif; }

        /* Existing Styles Retained */
        .video-background-wrapper {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; overflow: hidden; pointer-events: none;
            background: #000;
        }
        .video-container video {
            width: 100%; height: 100%; object-fit: cover;
            filter: brightness(0.4) contrast(1.1) saturate(0.8);
        }
        .video-overlay-gradient {
            position: fixed; inset: 0;
            background: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.4) 100%),
                        linear-gradient(to bottom, rgba(0,0,0,0.6) 0%, transparent 50%, rgba(0,0,0,0.9) 100%);
            z-index: -1; pointer-events: none;
        }
        .nav-glass {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .light-mode .nav-glass {
            background: rgba(255, 255, 255, 0.7);
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
        }

        /* TV Frame Styling */
        .tv-frame {
            border: 18px solid #222; border-bottom-width: 35px; border-radius: 45px;
            background: #111; position: relative;
            box-shadow: 0 50px 100px -20px rgba(0,0,0,0.8), inset 0 0 40px rgba(0,0,0,1);
        }
        .tv-screen-content { position: relative; width: 100%; height: 100%; border-radius: 10px; overflow: hidden; background: #000; }
        .scanline { width: 100%; height: 4px; background: rgba(255, 255, 255, 0.05); position: absolute; top: 0; left: 0; pointer-events: none; animation: scan 6s linear infinite; z-index: 10; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }

        /* Film Strip */
        .film-strip-container { background: rgba(0, 0, 0, 0.5); padding: 40px 0; overflow: hidden; position: relative; }
        .film-strip { display: flex; gap: 15px; width: max-content; animation: film-scroll 60s linear infinite; }
        @keyframes film-scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        .film-frame { width: 320px; aspect-ratio: 16/9; background: #111; position: relative; border-left: 10px solid #1a1a1a; border-right: 10px solid #1a1a1a; flex-shrink: 0; cursor: pointer; }
        .film-frame::before, .film-frame::after { content: ''; position: absolute; left: -10px; right: -10px; height: 20px; background-image: radial-gradient(circle, #000 35%, transparent 40%); background-size: 20px 20px; z-index: 2; }
        .film-frame::before { top: 5px; } .film-frame::after { bottom: 5px; }
        .film-img { width: 100%; height: 100%; object-fit: cover; opacity: 0.7; filter: grayscale(0.5) contrast(1.2); transition: all 0.5s ease; }
        .film-frame:hover .film-img { opacity: 1; filter: grayscale(0) contrast(1); }

        /* Contact Section Interactivity */
        .contact-interactive-bg {
            position: absolute; inset: 0;
            background-image: url('276dc366b2e06605263a41d5b50333c4.jpg');
            background-size: cover; background-position: center;
            opacity: 0.15; mix-blend-mode: screen;
            transition: opacity 0.5s ease, transform 0.1s ease-out;
            pointer-events: none; z-index: 1;
        }
        #contact:hover .contact-interactive-bg { opacity: 0.45; }

        .animate-marquee { display: inline-block; animation: marquee 20s linear infinite; }
        @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

        .track-label { width: 55px; background: #353535; border-right: 2px solid #111; font-size: 9px; font-weight: 800; color: #888; display: flex; align-items: center; justify-content: center; text-transform: uppercase; }
        .playhead-line { width: 1px; height: 100%; background: #40a9ff; position: absolute; top: 0; pointer-events: none; z-index: 60; box-shadow: 0 0 10px rgba(64, 169, 255, 0.5); }
        .playhead-head { width: 12px; height: 16px; background: #40a9ff; clip-path: polygon(0% 0%, 100% 0%, 100% 70%, 50% 100%, 0% 70%); position: absolute; top: 0; transform: translateX(-50%); }
        .premiere-panel { background-color: var(--panel-bg); border: 1px solid rgba(255,255,255,0.05); }

        /* Floating Image Style */
        .floating-image { filter: drop-shadow(0 20px 40px rgba(0,0,0,0.8)); mask-image: linear-gradient(to bottom, black 80%, transparent 100%); -webkit-mask-image: linear-gradient(to bottom, black 80%, transparent 100%); }
    </style>
</head>
<body class="ltr">

    <div class="video-background-wrapper">
        <div class="video-container">
            <video autoplay muted loop playsinline>
                <source src="5.mp4" type="video/mp4">
            </video>
        </div>
    </div>
    <div class="video-overlay-gradient"></div>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const { motion, AnimatePresence } = window.Motion;

        const Icons = {

          Instagram: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="20" height="20" x="2" y="2" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" x2="17.51" y1="6.5" y2="6.5"/></svg>,
          Facebook: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/></svg>,
          Tiktok: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 12a4 4 0 1 0 4 4V4a5 5 0 0 0 5 5"/></svg>,
          Download: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>,
          Play: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>,
          X: () => <svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>,
          Selection: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#40a9ff" strokeWidth="3"><path d="M3 3l7 18 3-7 7-3-17-8z"/></svg>,
          Razor: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#aaa" strokeWidth="2"><path d="M11 2v20M7 2l8 20"/></svg>,
          Mail: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/><rect width="20" height="16" x="2" y="4" rx="2"/></svg>,
          Sun: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>,
          Moon: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
        };

        const TIMELINE_EVENTS = [
          { id: 1, year: "2014 — 2018", role_en: "Multimedia Producer", role_ar: "منتج وسائط متعددة", company: "Gamma Rapho Agency", track: "V2", color: "#5c3a91", start: 0, end: 16, video: "https://player.vimeo.com/video/348818970" },
          { id: 2, year: "2018 — 2022", role_en: "Multimedia Producer", role_ar: "منتج وسائط متعددة", company: "Al Ghad TV", track: "V1", color: "#2b4c7e", start: 16, end: 33, video: "https://player.vimeo.com/video/782962222" },
          { id: 3, year: "2019 — 2021", role_en: "Multimedia Producer", role_ar: "منتج وسائط متعددة", company: "WAYA Media", track: "V2", color: "#2d5a27", start: 33, end: 50, video: "https://player.vimeo.com/video/1093436208" },
          { id: 4, year: "2022 — 2023", role_en: "Multimedia Manager", role_ar: "مدير وسائط متعددة", company: "Baheya Foundation", track: "V1", color: "#8a2b53", start: 50, end: 66, video: "https://player.vimeo.com/video/1081226158" },
          { id: 5, year: "2023 — 2024", role_en: "Freelance Producer", role_ar: "منتج مستقل", company: "BBC / DW / Reuters", track: "V2", color: "#4a4a4a", start: 66, end: 83, video: "https://player.vimeo.com/video/1088303838" },
          { id: 6, year: "2024 — Present", role_en: "Multimedia Producer", role_ar: "منتج وسائط متعددة", company: "FLOW Medical (HMG)", track: "V1", color: "#d8b97a", start: 83, end: 100, video: "https://player.vimeo.com/video/1081231929" }
        ];

        const EXTENDED_VIDEOS = [
          "https://player.vimeo.com/video/1081231929", "https://player.vimeo.com/video/1093436208", "https://player.vimeo.com/video/1012761186",
          "https://player.vimeo.com/video/782962222", "https://player.vimeo.com/video/1081226158", "https://player.vimeo.com/video/348818970",
          "https://player.vimeo.com/video/1137725566", "https://player.vimeo.com/video/1088303838", "https://player.vimeo.com/video/697540206",
          "https://player.vimeo.com/video/348850766", "https://player.vimeo.com/video/1127837184", "https://player.vimeo.com/video/348850143",
          "https://www.youtube.com/embed/n4gmpMHBUK4", "https://player.vimeo.com/video/1141818722", "https://www.youtube.com/embed/DqZM6chIz8c",
          "https://player.vimeo.com/video/815712178", "https://www.youtube.com/embed/6J3qrLEB6Uw", "https://www.youtube.com/embed/Lb1WNNI-mJU",
          "https://www.youtube.com/embed/k-BVul-oCNQ", "https://www.youtube.com/embed/B0KC9WzoYfw", "https://www.youtube.com/embed/8o3vHHhsed4",
          "https://player.vimeo.com/video/1127838352", "https://www.youtube.com/embed/sYUCtAFHbfc", "https://www.youtube.com/embed/sz8RTnunR-U",
          "https://player.vimeo.com/video/919167340", "https://www.youtube.com/embed/bTyCS3wRJBc", "https://www.youtube.com/embed/34fza20tlhA",
          "https://www.youtube.com/embed/cc5rdSxI6ws"
        ];

        const Translations = {
          en: {
            home: "Home", exp: "Experience", work: "Portfolio", contact: "Contact",
            heroTitle: "STORY", heroSubtitle: "TELLER", heroTag: "Visual Producer • Creative Brand Director",
            expTitle: "WORK EXPERIENCE", filmTitle: "CINEMATIC FILM STRIP", contactTitle: "CONNECT",
            download: "Portfolio PDF", inquiry: "Direct Inquiry", ksa: "KSA Office", egy: "EGY Office"
          },
          ar: {
            home: "الرئيسية", exp: "الخبرة", work: "الأعمال", contact: "اتصل بنا",
            heroTitle: "راوي", heroSubtitle: "قصص", heroTag: "منتج بصري • مدير براند إبداعي",
            expTitle: "الخبرة العملية", filmTitle: "شريط الفيلم السينمائي", contactTitle: "تواصل معي",
            download: "ملف الأعمال PDF", inquiry: "طلب تواصل مباشر", ksa: "مكتب السعودية", egy: "مكتب مصر"
          }
        };

        const SectionDivider = ({ text }) => (
          <div className="w-full h-20 bg-[#0a0a0a]/30 backdrop-blur-sm flex items-center justify-center overflow-hidden border-y border-white/5 relative">
            <div className="absolute inset-0 flex items-center opacity-5">
               <div className="whitespace-nowrap animate-marquee font-black text-6xl uppercase">
                  {text} • {text} • {text} • {text} • {text} • {text} • {text} • {text}
               </div>
            </div>
            <div className="relative z-10 flex items-center gap-4">
              <div className="h-[1px] w-16 bg-[#d8b97a]" />
              <span className="text-[10px] font-black tracking-[0.4em] uppercase text-[#d8b97a]">{text}</span>
              <div className="h-[1px] w-16 bg-[#d8b97a]" />
            </div>
          </div>
        );

        function App() {
          const [lang, setLang] = useState('en');
          const [isDark, setIsDark] = useState(true);
          const [hoverX, setHoverX] = useState(90);
          const [activeEvent, setActiveEvent] = useState(TIMELINE_EVENTS[5]);
          const [selectedVideo, setSelectedVideo] = useState(null);
          const [mousePos, setMousePos] = useState({ x: 0, y: 0 });
          const t = Translations[lang];

          const toggleLang = () => {
            const newLang = lang === 'en' ? 'ar' : 'en';
            setLang(newLang);
            document.body.className = newLang === 'ar' ? 'rtl' : 'ltr';
          };

          const toggleTheme = () => {
            setIsDark(!isDark);
            document.body.classList.toggle('light-mode');
          };

          const handleMouseMove = (e) => {
            if (e.currentTarget.id === "contact") {
              const rect = e.currentTarget.getBoundingClientRect();
              setMousePos({ x: e.clientX - rect.left, y: e.clientY - rect.top });
            }
          };

          const getThumb = (url) => {
            if (url.includes('vimeo')) return `https://vumbnail.com/${url.split('/').pop()}.jpg`;
            if (url.includes('youtube') || url.includes('youtu.be')) {
               const id = url.split('/').pop().split('?')[0];
               return `https://img.youtube.com/vi/${id}/mqdefault.jpg`;
            }
            return "";
          };

          return (
            <div className={`min-h-screen ${lang === 'ar' ? 'rtl' : 'ltr'}`}>
              
              {/* --- NAV BAR --- */}

                     {lang === 'en' ? 'HESHAM' : 'هشام'} <span className="text-[#d8b97a] ml-1">{lang === 'en' ? 'ABDELHAMED' : 'عبد الحميد'}</span>
                  </div>
                </div>
                
                <div className="hidden md:flex gap-8 text-[10px] font-bold tracking-widest uppercase text-zinc-400">
                    <a href="#" className="hover:text-[#d8b97a] transition-colors">{t.home}</a>
                    <a href="#experience" className="hover:text-[#d8b97a] transition-colors">{t.exp}</a>
                    <a href="#work" className="hover:text-[#d8b97a] transition-colors">{t.work}</a>
                    <a href="#contact" className="hover:text-[#d8b97a] transition-colors">{t.contact}</a>
                </div>

                <div className="flex-1 flex justify-end items-center gap-4">
                  <button onClick={toggleTheme} className="p-2 bg-zinc-800 rounded-full hover:bg-[#d8b97a] hover:text-black transition-all">
                    {isDark ? <Icons.Sun /> : <Icons.Moon />}
                  </button>
                  <button onClick={toggleLang} className="px-3 py-1 bg-zinc-800 rounded-lg text-[10px] font-black uppercase tracking-widest hover:bg-[#d8b97a] hover:text-black transition-all">
                    {lang === 'en' ? 'العربية' : 'EN'}
                  </button>
                </div>
              </nav>

              {/* Hero Section */}
              <section className="relative h-screen flex flex-col items-center justify-center overflow-hidden">
                <div className="relative z-10 text-center px-6">
                  <motion.h1 initial={{y: 50, opacity: 0}} animate={{y: 0, opacity: 1}} className="text-7xl md:text-[11rem] font-black leading-none uppercase mb-6">
                    {t.heroTitle}<br />
                    <span className="text-transparent italic" style={{ WebkitTextStroke: `1.5px ${isDark ? '#d8b97a' : '#b08d4b'}` }}>{t.heroSubtitle}</span>
                  </motion.h1>
                  <p className="text-[#d8b97a] text-[10px] md:text-sm font-black tracking-[0.7em] uppercase mb-12 opacity-80">{t.heroTag}</p>
                  <div className="flex gap-4 justify-center">
                    <a href="#" className="flex items-center gap-3 px-10 py-4 bg-[#d8b97a] text-black font-black uppercase tracking-widest text-[10px] rounded-full hover:bg-white transition-all shadow-[0_0_20px_rgba(216,185,122,0.3)]">
                      <Icons.Download /> {t.download}
                    </a>
                  </div>
                </div>
              </section>

              <SectionDivider text={t.expTitle} />

              {/* Experience Section */}
              <section id="experience" className="py-24 premiere-bg border-y border-white/5">
                <div className="max-w-7xl mx-auto px-6">
                  <div className="grid lg:grid-cols-12 gap-10 mb-16">
                    <div className="lg:col-span-8">
                      <div className="tv-frame aspect-video p-2">
                        <div className="tv-screen-content">
                          <div className="scanline" />
                          <iframe key={activeEvent.id} src={`${activeEvent.video}?background=1&autoplay=1&loop=1&muted=1`} className="w-full h-full object-cover scale-110" frameBorder="0" />
                        </div>
                      </div>
                    </div>
                    <div className="lg:col-span-4 premiere-panel p-8 rounded-xl shadow-2xl flex flex-col justify-center">
                      <h3 className="text-3xl font-black uppercase mb-4">{lang === 'en' ? activeEvent.role_en : activeEvent.role_ar}</h3>
                      <p className="text-xl font-bold text-[#d8b97a] mb-2">{activeEvent.company}</p>
                      <p className="text-sm text-zinc-400 italic mb-6">Experience spanning over years of media production and creative directing.</p>
                      <div className="text-[10px] font-mono text-zinc-500 uppercase">{activeEvent.year}</div>
                    </div>
                  </div>
                  
                  {/* Premiere Timeline */}
                  <div className="premiere-panel rounded-xl overflow-hidden flex shadow-2xl border-2 border-black">
                    <div className="w-14 bg-[#2b2b2b] border-r border-black flex flex-col items-center py-6 gap-8">
                      <div className="p-2 bg-[#3d3d3d] rounded cursor-pointer shadow-lg"><Icons.Selection /></div>
                      <div className="p-2 hover:bg-[#3d3d3d] rounded cursor-pointer"><Icons.Razor /></div>
                    </div>
                    <div className="flex-1 relative flex flex-col bg-[#111]">
                      <div className="relative h-28 cursor-crosshair" onMouseMove={(e) => {
                        const rect = e.currentTarget.getBoundingClientRect();
                        const x = ((e.clientX - rect.left) / rect.width) * 100;
                        setHoverX(x);
                        const found = TIMELINE_EVENTS.find(ev => x >= ev.start && x <= ev.end);
                        if(found) setActiveEvent(found);
                      }}>
                        <div className="playhead-line" style={{ left: `${hoverX}%` }}><div className="playhead-head" /></div>
                        {['V2', 'V1'].map((tName) => (
                          <div key={tName} className="flex border-b border-black">
                             <div className="track-label">{tName}</div>
                             <div className="flex-1 h-12 relative overflow-hidden">
                               {TIMELINE_EVENTS.filter(e => e.track === tName).map(ev => (
                                 <div key={ev.id} className={`absolute h-full border-l-4 border-white/10 flex items-center px-4 text-[9px] font-black uppercase transition-all ${activeEvent.id === ev.id ? 'brightness-125' : 'opacity-40'}`}
                                      style={{ left: `${ev.start}%`, width: `${ev.end-ev.start}%`, backgroundColor: ev.color }}>
                                   {ev.company}
                                 </div>
                               ))}
                             </div>
                          </div>
                        ))}
                      </div>
                    </div>
                  </div>
                </div>
              </section>

              <SectionDivider text={t.filmTitle} />

              {/* FILM STRIP REEL */}
              <section id="work" className="film-strip-container border-b border-white/5 relative">
                <div className="film-strip">
                   {[...EXTENDED_VIDEOS, ...EXTENDED_VIDEOS].map((url, idx) => (
                     <div key={idx} className="film-frame" onClick={() => setSelectedVideo(url)}>
                       <img src={getThumb(url)} className="film-img" alt="Film frame" />
                       <div className="absolute inset-0 flex items-center justify-center opacity-0 hover:opacity-100 transition-opacity bg-black/40">
                         <div className="p-3 bg-[#d8b97a] rounded-full text-black"><Icons.Play /></div>
                       </div>
                     </div>
                   ))}
                </div>
              </section>

              <SectionDivider text={t.contact} />

              {/* --- CONTACT SECTION --- */}
              <section id="contact" 
                       className="py-32 px-6 bg-[#080808] relative overflow-hidden" 
                       onMouseMove={handleMouseMove}>
                
                {/* Background Interactive Layer */}
                <div className="contact-interactive-bg" 
                     style={{ 
                       transform: `translate(${(mousePos.x - 500) * 0.02}px, ${(mousePos.y - 300) * 0.02}px)` 
                     }} />

                <div className="max-w-7xl mx-auto relative z-10 flex flex-col lg:flex-row gap-16 items-center">
                  
                  <div className="flex-1 relative">
                    <motion.h2 
                        initial={{ opacity: 0, scale: 0.9 }} 
                        whileInView={{ opacity: 1, scale: 1 }}
                        className="text-8xl md:text-[10rem] font-black leading-none uppercase tracking-tighter"
                        style={{ 
                            color: 'transparent', 
                            WebkitTextStroke: isDark ? '2px rgba(255,255,255,0.2)' : '2px rgba(0,0,0,0.2)',
                            textShadow: `0 0 20px rgba(216,185,122,${(mousePos.x / 1000) * 0.3})`
                        }}>
                      {t.contactTitle}
                    </motion.h2>
                    <div className="mt-12">
                      <img src="Hesham.png" alt="Hesham" className="w-80 floating-image grayscale hover:grayscale-0 transition-all duration-700" />
                    </div>
                  </div>

                  <div className="flex-1 w-full">
                    <div className="space-y-8">
                       <div className="p-10 bg-zinc-900/80 backdrop-blur-xl border-2 border-[#d8b97a]/20 rounded-2xl shadow-2xl">
                          <h4 className="text-xl font-black uppercase text-[#d8b97a] mb-6 flex items-center gap-3">
                            <Icons.Mail /> {t.inquiry}
                          </h4>
                          <a href="mailto:per.hisham@gmail.com" className="text-3xl md:text-4xl font-black hover:text-[#d8b97a] transition-colors underline decoration-[#d8b97a]/30 underline-offset-8">per.hisham@gmail.com</a>
                          <div className="mt-10 grid grid-cols-1 md:grid-cols-2 gap-8 pt-8 border-t border-white/5">
                             <div>
                               <p className="text-[10px] font-black text-zinc-500 uppercase tracking-widest mb-1">{t.ksa}</p>
                               <p className="font-black text-xl">+966 50 306 4408</p>
                             </div>
                             <div>
                               <p className="text-[10px] font-black text-zinc-500 uppercase tracking-widest mb-1">{t.egy}</p>
                               <p className="font-black text-xl">+20 10 10 72 3207</p>
                             </div>
                          </div>
                       </div>

                       <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                          {[
                            { icon: <Icons.Linkedin />, url: 'https://www.linkedin.com/in/hishamabdelhamed' },
                            { icon: <Icons.Instagram />, url: 'https://www.instagram.com/hisham.abdlhamed' },
                            { icon: <Icons.Facebook />, url: 'https://facebook.com/hishamabdelhamedd' },
                            { icon: <Icons.Tiktok />, url: 'https://www.tiktok.com/@hisham.abdelhamed' }
                          ].map((social, i) => (
                            <a key={i} href={social.url} target="_blank" className="p-6 bg-zinc-900 flex justify-center items-center rounded-xl hover:bg-[#d8b97a] hover:text-black transition-all transform hover:scale-105">
                               {social.icon}
                            </a>
                          ))}
                       </div>
                    </div>
                  </div>
                </div>
              </section>

              {/* Video Modal */}
              <AnimatePresence>
                {selectedVideo && (
                  <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }} className="fixed inset-0 z-[110] bg-black/98 flex items-center justify-center p-4 backdrop-blur-xl">
                    <button onClick={() => setSelectedVideo(null)} className="absolute top-10 right-10 text-white"><Icons.X /></button>
                    <div className="w-full max-w-5xl aspect-video rounded-3xl overflow-hidden border border-white/10">
                      <iframe src={selectedVideo.includes('youtube') ? `${selectedVideo}?autoplay=1` : `${selectedVideo}?autoplay=1`} className="w-full h-full" frameBorder="0" allow="autoplay; fullscreen" allowFullScreen />
                    </div>
                  </motion.div>
                )}
              </AnimatePresence>

              <footer className="py-12 text-center opacity-40 text-[9px] font-black tracking-[0.5em] uppercase border-t border-white/5 bg-black">
                Hesham Abdelhamed • Visual Storyteller • 2026
              </footer>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
